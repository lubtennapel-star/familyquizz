<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Van den Berg Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1927;
    --card: #22213a;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --text: #fffffe;
    --muted: #a7a9be;
    --border: #2e2d4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  /* JOIN SCREEN */
  #screen-join {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    line-height: 1.1;
  }

  .join-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1.5rem;
    padding: 2rem;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .join-card label {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .name-input {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 0.75rem;
    padding: 1rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input:focus { border-color: var(--accent2); }

  .join-btn {
    background: linear-gradient(135deg, var(--accent3), #2ecc71);
    border: none;
    border-radius: 0.75rem;
    padding: 1rem;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    transition: transform 0.1s;
  }
  .join-btn:active { transform: scale(0.98); }

  /* WAITING SCREEN */
  #screen-waiting {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    text-align: center;
    max-width: 340px;
  }

  .waiting-icon {
    font-size: 4rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .waiting-name {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .waiting-text {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.5;
  }

  /* QUESTION SCREEN */
  #screen-question {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 500px;
    gap: 1.5rem;
  }

  .q-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .q-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2rem;
    padding: 0.3rem 0.85rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .q-type-badge {
    font-size: 0.8rem;
    padding: 0.3rem 0.85rem;
    border-radius: 2rem;
    font-weight: 600;
  }

  .q-type-open { background: rgba(255,107,107,0.15); color: var(--accent); }
  .q-type-mc { background: rgba(77,150,255,0.15); color: var(--accent4); }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1.25rem;
    padding: 1.25rem;
    font-family: 'Syne', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.3;
  }

  /* MC options */
  .mc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .mc-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 1rem;
    padding: 1rem 0.75rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .mc-btn:active { transform: scale(0.97); }

  .mc-btn.selected {
    border-color: var(--accent4);
    background: rgba(77,150,255,0.15);
  }

  .opt-dot {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .oa { background: var(--accent); }
  .ob { background: var(--accent4); }
  .oc { background: var(--accent3); color: #000; }
  .od { background: var(--accent2); color: #000; }

  /* Open answer */
  .open-input {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 0.75rem;
    padding: 1rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    width: 100%;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
  }
  .open-input:focus { border-color: var(--accent2); }

  /* Submit */
  .submit-btn {
    background: linear-gradient(135deg, var(--accent), #ff8e53);
    border: none;
    border-radius: 0.75rem;
    padding: 1rem;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 4px 20px rgba(255,107,107,0.3);
    transition: transform 0.1s;
  }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Submitted state */
  #screen-submitted {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    text-align: center;
    max-width: 340px;
  }

  .submitted-icon {
    font-size: 4rem;
    animation: bounce 0.5s ease;
  }
  @keyframes bounce {
    0% { transform: scale(0.5); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .submitted-answer {
    background: var(--surface);
    border: 1px solid var(--accent3);
    border-radius: 1rem;
    padding: 1rem 1.5rem;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    color: var(--accent3);
    max-width: 100%;
    word-break: break-word;
  }

  /* Leaderboard screen */
  #screen-leaderboard {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    text-align: center;
    width: 100%;
    max-width: 400px;
  }

  #screen-leaderboard h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .lb-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0.75rem;
    padding: 0.75rem 1rem;
    animation: slideUp 0.4s ease both;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .lb-row:nth-child(1) { border-color: var(--accent2); }

  .lb-rk { font-family: 'Syne', sans-serif; font-size: 1.2rem; min-width: 2rem; }
  .lb-nm { flex: 1; font-weight: 600; font-size: 0.95rem; text-align: left; }
  .lb-sc { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--accent2); }

  .my-score-highlight { border-color: var(--accent3) !important; background: rgba(107,203,119,0.08); }
</style>
</head>
<body>

<!-- JOIN -->
<div id="screen-join">
  <div class="logo">Van den Berg<br>Quiz</div>
  <div class="join-card">
    <label>Jouw naam</label>
    <input class="name-input" id="name-input" type="text" placeholder="Voer je naam in" maxlength="20" autocomplete="off">
    <button class="join-btn" onclick="joinQuiz()">Doe mee!</button>
  </div>
</div>

<!-- WAITING -->
<div id="screen-waiting">
  <div class="waiting-icon">⏳</div>
  <div class="waiting-name" id="waiting-name"></div>
  <div class="waiting-text">Je bent ingelogd! De quiz begint zodra de host de eerste vraag start.</div>
</div>

<!-- QUESTION -->
<div id="screen-question">
  <div class="q-header">
    <div class="q-badge">Vraag <span id="pq-num">1</span></div>
    <div class="q-type-badge" id="q-type-badge"></div>
  </div>
  <div class="question-card" id="pq-text"></div>
  <div id="mc-grid" class="mc-grid" style="display:none;"></div>
  <textarea class="open-input" id="open-input" placeholder="Typ je antwoord..." style="display:none;"></textarea>
  <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">Antwoord insturen</button>
</div>

<!-- SUBMITTED -->
<div id="screen-submitted">
  <div class="submitted-icon">✅</div>
  <p style="color:var(--muted);">Jouw antwoord:</p>
  <div class="submitted-answer" id="submitted-answer-display"></div>
  <p style="color:var(--muted); font-size:0.9rem;">Wacht op de volgende vraag...</p>
</div>

<!-- LEADERBOARD -->
<div id="screen-leaderboard">
  <h2>Leaderboard</h2>
  <div class="lb-list" id="lb-list"></div>
  <p style="color:var(--muted); font-size:0.85rem; margin-top:0.5rem;">Wacht op de volgende vraag...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push, update, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvDsrJOUh3yYo1IGCCXUu-sVgyN8cDiZc",
  authDomain: "family-quiz-88872.firebaseapp.com",
  databaseURL: "https://family-quiz-88872-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "family-quiz-88872",
  storageBucket: "family-quiz-88872.firebasestorage.app",
  messagingSenderId: "842202990870",
  appId: "1:842202990870:web:51b8ed84f4c5416564e837"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myUid = null;
let myName = null;
let ROOM = 'quiz1';
let currentQ = -1;
let selectedMcAnswer = null;
let hasAnswered = false;

// Generate a unique ID
function genUid() {
  return Math.random().toString(36).slice(2,10) + Date.now().toString(36);
}

// Join
window.joinQuiz = async function() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) {
    document.getElementById('name-input').style.borderColor = 'var(--accent)';
    return;
  }

  myUid = genUid();
  myName = name;

  await set(ref(db, `${ROOM}/players/${myUid}`), {
    name: myName,
    score: 0,
    joinedAt: Date.now()
  });

  show('waiting');
  document.getElementById('waiting-name').textContent = myName;
  startListening();
};

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.joinQuiz();
});

function startListening() {
  onValue(ref(db, `${ROOM}/state`), snap => {
    const state = snap.val();
    if (!state) return;

    if (state.phase === 'lobby') {
      show('waiting');
    } else if (state.phase === 'question') {
      if (state.currentQ !== currentQ) {
        currentQ = state.currentQ;
        hasAnswered = false;
        selectedMcAnswer = null;
        renderQuestion(state);
        show('question');
      }
    } else if (state.phase === 'leaderboard') {
      loadLeaderboard();
      show('leaderboard');
    }
  });
}

function renderQuestion(state) {
  document.getElementById('pq-num').textContent = state.currentQ + 1;
  document.getElementById('pq-text').textContent = state.questionText;

  const badge = document.getElementById('q-type-badge');
  const mc = document.getElementById('mc-grid');
  const open = document.getElementById('open-input');
  const btn = document.getElementById('submit-btn');
  btn.disabled = false;

  if (state.questionType === 'multiple' && state.answers && state.answers.length > 0) {
    badge.textContent = 'Meerkeuze';
    badge.className = 'q-type-badge q-type-mc';
    mc.style.display = 'grid';
    open.style.display = 'none';
    mc.innerHTML = '';
    const letters = ['A','B','C','D'];
    const dots = ['oa','ob','oc','od'];
    state.answers.forEach((ans, i) => {
      const btn2 = document.createElement('button');
      btn2.className = 'mc-btn';
      btn2.innerHTML = `<span class="opt-dot ${dots[i]}">${letters[i]}</span>${escHtml(ans)}`;
      btn2.onclick = () => {
        document.querySelectorAll('.mc-btn').forEach(b => b.classList.remove('selected'));
        btn2.classList.add('selected');
        selectedMcAnswer = ans;
      };
      mc.appendChild(btn2);
    });
  } else {
    badge.textContent = 'Open vraag';
    badge.className = 'q-type-badge q-type-open';
    mc.style.display = 'none';
    open.style.display = 'block';
    open.value = '';
  }
}

window.submitAnswer = async function() {
  if (hasAnswered) return;
  let answer;

  const state = await get(ref(db, `${ROOM}/state`));
  const stateVal = state.val();
  if (!stateVal || stateVal.phase !== 'question') return;

  if (stateVal.questionType === 'multiple') {
    if (!selectedMcAnswer) {
      // Shake feedback
      const mc = document.getElementById('mc-grid');
      mc.style.animation = 'none';
      mc.offsetHeight;
      mc.style.animation = 'shake 0.3s ease';
      return;
    }
    answer = selectedMcAnswer;
  } else {
    answer = document.getElementById('open-input').value.trim();
    if (!answer) {
      document.getElementById('open-input').style.borderColor = 'var(--accent)';
      return;
    }
  }

  hasAnswered = true;
  await set(ref(db, `${ROOM}/answers/${currentQ}/${myUid}`), answer);

  document.getElementById('submitted-answer-display').textContent = answer;
  show('submitted');
};

async function loadLeaderboard() {
  const snap = await get(ref(db, `${ROOM}/players`));
  const players = snap.val() || {};
  const sorted = Object.entries(players)
    .map(([uid, p]) => ({ uid, name: p.name, score: p.score || 0 }))
    .sort((a,b) => b.score - a.score);

  const list = document.getElementById('lb-list');
  list.innerHTML = '';
  const medals = ['🥇','🥈','🥉'];
  sorted.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'lb-row' + (p.uid === myUid ? ' my-score-highlight' : '');
    div.style.animationDelay = `${i*0.07}s`;
    div.innerHTML = `
      <span class="lb-rk">${medals[i] || i+1}</span>
      <span class="lb-nm">${escHtml(p.name)}${p.uid === myUid ? ' 👈' : ''}</span>
      <span class="lb-sc">${p.score}</span>
    `;
    list.appendChild(div);
  });
}

function show(screen) {
  ['join','waiting','question','submitted','leaderboard'].forEach(s => {
    document.getElementById(`screen-${s}`).style.display = s === screen ? 'flex' : 'none';
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
